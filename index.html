<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <header class="header">
        <h1 class="month-year">March 2024</h1>
        <div class="today-indicator">
            <span>Today</span>
        </div>
    </header>

    <main class="calendar-container">

        <div class="weekdays">
            <div class="weekday">Mon</div>
            <div class="weekday">Tue</div>
            <div class="weekday">Wed</div>
            <div class="weekday">Thu</div>
            <div class="weekday">Fri</div>
            <div class="weekday">Sat</div>
            <div class="weekday">Sun</div>
        </div>

        <div class="calendar-grid">

            <div class="calendar-day other-month"><div class="day-number">26</div></div>
            <div class="calendar-day other-month"><div class="day-number">27</div></div>
            <div class="calendar-day other-month"><div class="day-number">28</div></div>
            <div class="calendar-day other-month"><div class="day-number">29</div></div>
            <div class="calendar-day current-month"><div class="day-number">1</div></div>
            <div class="calendar-day current-month"><div class="day-number">2</div></div>
            <div class="calendar-day current-month"><div class="day-number">3</div></div>

            <div class="calendar-day current-month"><div class="day-number">4</div></div>
            <div class="calendar-day current-month"><div class="day-number">5</div></div>
            <div class="calendar-day current-month"><div class="day-number">6</div></div>
            <div class="calendar-day current-month"><div class="day-number">7</div></div>
            <div class="calendar-day current-month"><div class="day-number">8</div></div>
            <div class="calendar-day current-month"><div class="day-number">9</div></div>
            <div class="calendar-day current-month"><div class="day-number">10</div></div>

            <div class="calendar-day current-month"><div class="day-number">11</div></div>
            <div class="calendar-day today"><div class="day-number">12</div></div>
            <div class="calendar-day current-month"><div class="day-number">13</div></div>
            <div class="calendar-day current-month"><div class="day-number">14</div></div>
            <div class="calendar-day current-month"><div class="day-number">15</div></div>
            <div class="calendar-day current-month"><div class="day-number">16</div></div>
            <div class="calendar-day current-month"><div class="day-number">17</div></div>

            <div class="calendar-day current-month"><div class="day-number">18</div></div>
            <div class="calendar-day current-month"><div class="day-number">19</div></div>
            <div class="calendar-day current-month"><div class="day-number">20</div></div>
            <div class="calendar-day current-month"><div class="day-number">21</div></div>
            <div class="calendar-day current-month"><div class="day-number">22</div></div>
            <div class="calendar-day current-month"><div class="day-number">23</div></div>
            <div class="calendar-day current-month"><div class="day-number">24</div></div>

            <div class="calendar-day current-month"><div class="day-number">25</div></div>
            <div class="calendar-day current-month"><div class="day-number">26</div></div>
            <div class="calendar-day current-month"><div class="day-number">27</div></div>
            <div class="calendar-day current-month"><div class="day-number">28</div></div>
            <div class="calendar-day current-month"><div class="day-number">29</div></div>
            <div class="calendar-day current-month"><div class="day-number">30</div></div>
            <div class="calendar-day current-month"><div class="day-number">31</div></div>

        </div>
    </main>

    <div class="fab-button">+</div>

    <nav class="navigation">
        <div class="nav-item active">Month</div>
        <div class="nav-item">Week</div>
        <div class="nav-item">Day</div>
        <div class="nav-item">Search</div>
        <div class="nav-item">Settings</div>
    </nav>

</div>

</body>
</html>
